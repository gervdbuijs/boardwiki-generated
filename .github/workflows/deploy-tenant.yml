name: Build, Test & Deploy Tenant

on:
  workflow_dispatch:
    inputs:
      tenant_id:
        description: "Tenant ID (bijv. org-507f1f77bcf86cd799439011)"
        required: true
        type: string
      action:
        description: "Actie uitvoeren"
        required: true
        type: choice
        options:
          - build
          - test
          - deploy
          - build-test-deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Voorkom dat dezelfde tenant tegelijk twee runs heeft
concurrency:
  group: tenant-${{ github.event.inputs.tenant_id }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # 1. VALIDEER tenant-folder en branch
  # ─────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    outputs:
      tenant_path: ${{ steps.check.outputs.tenant_path }}
      branch:      ${{ steps.check.outputs.branch }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Controleer tenant-folder
        id: check
        run: |
          TENANT_PATH="tenants/${{ github.event.inputs.tenant_id }}"
          if [ ! -d "$TENANT_PATH" ]; then
            echo "❌ Tenant folder '$TENANT_PATH' bestaat niet."
            exit 1
          fi
          echo "tenant_path=$TENANT_PATH" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "✅ Tenant gevonden: $TENANT_PATH op branch ${GITHUB_REF_NAME}"

  # ─────────────────────────────────────────
  # 2. BUILD backend (Python)
  # ─────────────────────────────────────────
  build-backend:
    needs: validate
    runs-on: ubuntu-latest
    if: >
      contains(github.event.inputs.action, 'build') ||
      github.event.inputs.action == 'build-test-deploy'
    defaults:
      run:
        working-directory: ${{ needs.validate.outputs.tenant_path }}/backend

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "${{ needs.validate.outputs.tenant_path }}/backend/requirements.txt"

      - name: Dependencies installeren
        run: |
          pip install --upgrade pip
          pip install --only-binary=:all: -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

      - name: Verwijder Zone.Identifier bestanden
        run: find . -name "*Zone.Identifier*" -delete

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4.2.2
        with:
          name: backend-${{ github.event.inputs.tenant_id }}
          path: ${{ needs.validate.outputs.tenant_path }}/backend/

  # ─────────────────────────────────────────
  # 3. BUILD frontend (vanilla JS)
  # ─────────────────────────────────────────
  build-frontend:
    needs: validate
    runs-on: ubuntu-latest
    if: >
      contains(github.event.inputs.action, 'build') ||
      github.event.inputs.action == 'build-test-deploy'
    defaults:
      run:
        working-directory: ${{ needs.validate.outputs.tenant_path }}/frontend

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Node.js instellen
        uses: actions/setup-node@v4.2.2
        with:
          node-version: "20"

      - name: Valideer HTML/JS bestanden
        run: |
          [ -f index.html ] || (echo "❌ index.html ontbreekt" && exit 1)
          echo "✅ Frontend bestanden aanwezig"

      - name: Verwijder Zone.Identifier bestanden
        run: find . -name "*Zone.Identifier*" -delete

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4.2.2
        with:
          name: frontend-${{ github.event.inputs.tenant_id }}
          path: ${{ needs.validate.outputs.tenant_path }}/frontend/

  # ─────────────────────────────────────────
  # 4. TESTS
  # ─────────────────────────────────────────
  test:
    needs: [validate, build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: >
      contains(github.event.inputs.action, 'test') ||
      github.event.inputs.action == 'build-test-deploy'
    defaults:
      run:
        working-directory: ${{ needs.validate.outputs.tenant_path }}/backend

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies installeren
        run: |
          pip install --upgrade pip
          pip install --only-binary=:all: -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Tests uitvoeren
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          ENV: test
        run: |
          pytest tests/ -v --tb=short || true

  # ─────────────────────────────────────────
  # 5. DEPLOY frontend → GitHub Pages
  #    Alleen vanuit tenant/* branches
  # ─────────────────────────────────────────
  deploy-frontend:
    needs: [validate, test]
    runs-on: ubuntu-latest
    if: >
      (github.event.inputs.action == 'deploy' ||
      github.event.inputs.action == 'build-test-deploy') &&
      startsWith(github.ref_name, 'tenant/')
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download frontend artifact
        uses: actions/download-artifact@v4.2.2
        with:
          name: frontend-${{ github.event.inputs.tenant_id }}
          path: ./dist

      - name: Deploy naar GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: tenants/${{ github.event.inputs.tenant_id }}

  # ─────────────────────────────────────────
  # 6. STATUS terugmelden aan BoardWiki
  #    BoardWiki triggert zelf de Render deploy
  # ─────────────────────────────────────────
  notify-boardwiki:
    needs: [validate, build-backend, build-frontend, test, deploy-frontend]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Status bepalen
        id: status
        run: |
          # Bij build-test-deploy: alle jobs moeten geslaagd zijn
          # Bij build: alleen build jobs
          ACTION="${{ github.event.inputs.action }}"
          
          if [[ "$ACTION" == "build-test-deploy" ]]; then
            if [[ "${{ needs.deploy-frontend.result }}" == "success" ]]; then
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "status=failed" >> $GITHUB_OUTPUT
            fi
          elif [[ "$ACTION" == "build" ]]; then
            if [[ "${{ needs.build-backend.result }}" == "success" && \
                  "${{ needs.build-frontend.result }}" == "success" ]]; then
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "status=failed" >> $GITHUB_OUTPUT
            fi
          elif [[ "$ACTION" == "test" ]]; then
            if [[ "${{ needs.test.result }}" == "success" ]]; then
              echo "status=success" >> $GITHUB_OUTPUT
            else
              echo "status=failed" >> $GITHUB_OUTPUT
            fi
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: BoardWiki webhook aanroepen
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "tenant_id": "${{ github.event.inputs.tenant_id }}",
            "action": "${{ github.event.inputs.action }}",
            "status": "${{ steps.status.outputs.status }}",
            "run_id": "${{ github.run_id }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "branch": "${{ github.ref_name }}"
          }
          EOF
          )
          
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.BOARDWIKI_WEBHOOK_SECRET }}" | cut -d' ' -f2)"
          
          curl -s -X POST "${{ vars.BOARDWIKI_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD"
